<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
        authDomain: "placement-96094.firebaseapp.com",
        databaseURL: "https://placement-96094-default-rtdb.firebaseio.com",
        projectId: "placement-96094",
        storageBucket: "placement-96094.firebasestorage.app",
        messagingSenderId: "1061247846675",
        appId: "1:1061247846675:web:c6885811fcf1884582b2e6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // --- 1. GLOBAL UI & AUTH FUNCTIONS ---
    window.toggleModal = () => {
        const m = document.getElementById('loginModal');
        m.classList.toggle('hidden');
        m.classList.toggle('flex');
    };

    window.handleGoogleLogin = async () => {
        try {
            await signInWithPopup(auth, provider);
            window.toggleModal();
        } catch (e) {
            console.error("Auth Error:", e.message);
            alert("Auth failed. Ensure you are running on a local server (Live Server).");
        }
    };

    window.handleLogin = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            window.toggleModal();
        } catch (e) { alert(e.message); }
    };

    window.handleLogout = () => signOut(auth);

    // --- 2. ADMIN FUNCTIONS (Now accessible in Console) ---
    window.adminCreateBatch = async (name, desc, price) => {
        try {
            const batchRef = push(ref(db, 'premium_batches'));
            await set(batchRef, {
                id: batchRef.key,
                name: name,
                description: desc,
                price: price,
                createdAt: Date.now()
            });
            console.log("Success! Batch ID:", batchRef.key);
            alert("Batch Created!");
        } catch (e) { console.error(e); }
    };

    // --- 3. STATE LISTENERS ---
    onAuthStateChanged(auth, (user) => {
        const authDiv = document.getElementById('auth-state');
        if (user) {
            authDiv.innerHTML = `
                <div class="flex items-center gap-3 bg-white border p-1.5 pr-4 rounded-full shadow-sm">
                    <img src="${user.photoURL || 'https://via.placeholder.com/40'}" class="w-8 h-8 rounded-full">
                    <span class="text-sm font-bold text-slate-700">Dashboard</span>
                    <button onclick="handleLogout()" class="text-slate-400 hover:text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>`;
        } else {
            authDiv.innerHTML = `<button onclick="toggleModal()" class="text-blue-700 font-bold px-4">Login</button>
                                 <button onclick="toggleModal()" class="bg-blue-700 text-white px-6 py-2.5 rounded-full font-bold shadow-lg">Enroll Now</button>`;
        }
        lucide.createIcons();
    });

    function loadBatches() {
        const container = document.getElementById('batches-container');
        onValue(ref(db, 'premium_batches'), (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                container.innerHTML = `<p class="col-span-full text-center text-slate-400">No active batches yet.</p>`;
                return;
            }
            container.innerHTML = Object.values(data).map(b => `
                <div class="glass-card p-6 rounded-[2rem] shadow-xl bg-white border border-slate-100">
                    <div class="bg-blue-50 text-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="layers"></i></div>
                    <h3 class="text-xl font-black text-slate-800 mb-2">${b.name}</h3>
                    <p class="text-sm text-slate-500 mb-6">${b.description}</p>
                    <div class="flex justify-between items-center pt-4 border-t">
                        <span class="text-2xl font-black text-blue-600">₹${b.price}</span>
                        <button class="bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-bold">View Details</button>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        });
    }

    loadBatches();
    lucide.createIcons();
</script>
